  <script>
    const tg = window.Telegram && window.Telegram.WebApp;
    const data = JSON.parse(document.getElementById("resource-data").textContent);
    const params = new URLSearchParams(location.search);
    const bridgeUrl = params.get("bridge") || data.bridge_url;
    const state = {
      mode: data.modes[params.get("mode")] ? params.get("mode") : "company",
      query: ""
    };
    const input = document.getElementById("q");
    const list = document.getElementById("list");
    const count = document.getElementById("count");
    const status = document.getElementById("status");
    const closeButton = document.getElementById("close");
    const tabs = Array.from(document.querySelectorAll(".tab"));
    const norm = (value) => (value || "").normalize("NFC").toLocaleLowerCase("ko-KR").replace(/\s+/g, "");
    const CHOSEONG = "ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ";
    const HANGUL_BASE = 0xac00;
    const HANGUL_END = 0xd7a3;

    function initialOf(ch) {
      const code = ch.charCodeAt(0);
      if (code < HANGUL_BASE || code > HANGUL_END) return ch;
      return CHOSEONG[Math.floor((code - HANGUL_BASE) / 588)] || ch;
    }

    function initials(value) {
      return Array.from(norm(value)).map(initialOf).join("");
    }

    function charMatches(queryChar, nameChar) {
      if (CHOSEONG.includes(queryChar)) return initialOf(nameChar) === queryChar || nameChar === queryChar;
      return queryChar === nameChar;
    }

    function fuzzySubsequence(query, name) {
      const q = Array.from(norm(query));
      const target = Array.from(norm(name));
      if (!q.length) return true;
      let pos = 0;
      for (const queryChar of q) {
        let found = false;
        while (pos < target.length) {
          if (charMatches(queryChar, target[pos])) {
            found = true;
            pos += 1;
            break;
          }
          pos += 1;
        }
        if (!found) return false;
      }
      return true;
    }

    function dismissKeyboard() {
      input.blur();
      if (tg && typeof tg.hideKeyboard === "function") {
        try { tg.hideKeyboard(); } catch (_err) {}
      }
    }

    function closeApp() {
      dismissKeyboard();
      if (tg && typeof tg.close === "function") {
        try {
          tg.close();
          return;
        } catch (_err) {}
      }
      if (history.length > 1) history.back();
      else window.close();
    }

    function setMode(mode) {
      if (!data.modes[mode]) return;
      state.mode = mode;
      input.value = "";
      state.query = "";
      input.placeholder = data.modes[mode].placeholder;
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.mode === mode));
      render();
    }

    function matches(name) {
      const q = norm(state.query);
      if (!q) return true;
      const key = norm(name);
      return key.includes(q) || initials(name).includes(q) || fuzzySubsequence(q, name);
    }

    function render() {
      const q = norm(state.query);
      const items = data.modes[state.mode].items
        .filter(matches)
        .sort((a, b) => {
          if (!q) return a.localeCompare(b, "ko-KR");
          const ak = norm(a);
          const bk = norm(b);
          const ai = initials(a);
          const bi = initials(b);
          const score = (key, init) => key === q ? 0 : key.startsWith(q) ? 1 : init.startsWith(q) ? 2 : key.includes(q) ? 3 : init.includes(q) ? 4 : 5;
          return score(ak, ai) - score(bk, bi) || a.localeCompare(b, "ko-KR");
        });
      count.textContent = `${items.length}개`;
      if (!items.length) {
        list.innerHTML = '<div class="empty">검색 결과 없음</div>';
        return;
      }
      list.replaceChildren(...items.map((name) => {
        const row = document.createElement("button");
        row.className = "row";
        row.type = "button";
        row.innerHTML = `<span class="name"></span>`;
        row.querySelector(".name").textContent = name;
        row.addEventListener("click", () => choose(name));
        return row;
      }));
    }

    async function sendViaBridge(payload) {
      if (!tg || !tg.initData || !tg.initDataUnsafe || !tg.initDataUnsafe.query_id) {
        throw new Error("missing web app query");
      }
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);
      try {
        const response = await fetch(bridgeUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            ...payload,
            query_id: tg.initDataUnsafe.query_id,
            init_data: tg.initData
          }),
          signal: controller.signal
        });
        if (!response.ok) throw new Error(await response.text());
      } finally {
        clearTimeout(timeout);
      }
    }

    async function choose(name) {
      if (state.sending) return;
      state.sending = true;
      dismissKeyboard();
      const payload = { action: "lookup", mode: state.mode, name };
      status.textContent = `${name} 전송 중`;
      if (tg && tg.initDataUnsafe && tg.initDataUnsafe.query_id) {
        try {
          await sendViaBridge(payload);
          setTimeout(closeApp, 80);
          return;
        } catch (_err) {
          status.textContent = "전송 실패";
          state.sending = false;
          return;
        }
      }
      state.sending = false;
      status.textContent = "전송 실패";
    }

    tabs.forEach((tab) => tab.addEventListener("click", () => setMode(tab.dataset.mode)));
    closeButton.addEventListener("click", closeApp);
    input.addEventListener("input", () => {
      state.query = input.value;
      render();
    });
    input.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeApp();
      if (event.key === "Enter") dismissKeyboard();
    });
    if (tg) {
      tg.ready();
      if (typeof tg.expand === "function") tg.expand();
      if (tg.BackButton && typeof tg.BackButton.show === "function") {
        tg.BackButton.show();
        tg.BackButton.onClick(closeApp);
      }
    }
    setMode(state.mode);
  </script>
</body>
</html>
